<!-- fragments/syspanel/pm2_table.html -->
{% if procs %}
<div class="overflow-x-auto">
    <table class="w-full text-sm">
        <thead>
            <tr class="text-left text-xs text-gray-400 border-b border-gray-100">
                <th class="pb-2 pr-4 font-medium">Process</th>
                <th class="pb-2 pr-4 font-medium">Status</th>
                <th class="pb-2 pr-4 font-medium">CPU</th>
                <th class="pb-2 pr-4 font-medium">RAM</th>
                <th class="pb-2 pr-4 font-medium">Uptime</th>
                <th class="pb-2 pr-4 font-medium">Restarts</th>
                <th class="pb-2 font-medium">Action</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
            {% for p in procs %}
                {% include 'fragments/syspanel/pm2_row.html' %}
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="flex items-center gap-3 p-4 bg-red-50 rounded-lg border border-red-100">
    <svg class="w-6 h-6 text-red-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
    <div>
        <div class="font-semibold text-red-700">Không có PM2 process nào đang chạy</div>
        <div class="text-xs text-red-500 mt-0.5">Hệ thống có thể đang down. Dùng "Start System" để khởi động lại.</div>
    </div>
</div>
{% endif %}
