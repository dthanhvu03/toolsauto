{% extends "layouts/app.html" %}

{% block page_title %}<svg class="w-5 h-5 inline-block mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4">
    </path>
</svg> Database Explorer{% endblock %}
{% block page_subtitle %}Khám phá dữ liệu SQLite nội bộ{% endblock %}

{% block content %}
<div class="max-w-[1400px] mx-auto grid grid-cols-1 gap-6">
    <!-- ─── Database Explorer ─────────────────────────────────────────── -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-5 flex flex-col min-h-[500px]">
        <div class="flex flex-col sm:flex-row sm:flex-wrap sm:items-center justify-between gap-3 mb-4">
            <h2
                class="text-base font-semibold font-display text-gray-900 flex items-center gap-2 shrink-0 whitespace-nowrap">
                <svg class="w-5 h-5 inline-block mr-1 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4">
                    </path>
                </svg> Database Explorer
                <span
                    class="text-xs font-normal text-gray-400 bg-gray-50 border border-gray-100 rounded-full px-2 py-0.5 whitespace-nowrap shrink-0">Top
                    50 rows</span>
            </h2>
            <div class="flex items-center gap-3">
                <select id="db-table-select" name="table_name" hx-get="/database/fragments/db-explorer"
                    hx-target="#db-explorer-container" hx-trigger="change"
                    class="text-sm border-gray-200 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 py-1.5 pl-3 pr-8">
                    <option value="" disabled selected>Chọn Table...</option>
                    <option value="jobs">jobs</option>
                    <option value="accounts">accounts</option>
                    <option value="pages">pages</option>
                    <option value="viral_materials">viral_materials</option>
                    <option value="system_state">system_state</option>
                </select>
                <button hx-get="/database/fragments/db-explorer" hx-target="#db-explorer-container"
                    hx-include="#db-table-select"
                    class="text-xs text-indigo-600 hover:text-indigo-800 font-medium transition-colors">
                    ↻ Refresh
                </button>
            </div>
        </div>
        <div id="db-explorer-container"
            class="overflow-x-auto border border-gray-100 rounded-lg bg-gray-50 flex-1 flex items-center justify-center min-h-[300px]">
            <div class="text-sm text-gray-400">Please select a table to view data</div>
        </div>
    </div>
</div>
{% endblock %}
