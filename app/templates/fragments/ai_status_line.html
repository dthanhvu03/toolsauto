<!-- /fragments/ai_status_line.html -->
<div data-ai-caption-widget class="hidden items-center bg-gray-50 px-3 py-1.5 border border-t-0 border-gray-200 text-[11px] font-mono mt-0 rounded-b-lg w-full">
    
    <!-- LOADING -->
    <span data-ai-state-loading class="hidden items-center text-gray-500">
        <svg class="animate-spin h-3.5 w-3.5 mr-1" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        Đang mường tượng caption...
    </span>

    <!-- DONE / ERROR -->
    <div data-ai-state-done class="hidden w-full items-center">
        <!-- Provider Badge -->
        <span data-ai-provider-badge class="px-1.5 py-0.5 rounded font-bold mr-2 uppercase tracking-wide">
            IDLE
        </span>
        
        <!-- Model -->
        <span class="text-gray-500 mr-3 italic">
            <span data-ai-model-name>-</span>
        </span>

        <!-- Latency -->
        <span class="text-gray-500 flex items-center" title="Latency">
            <svg class="w-3 h-3 mr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <circle cx="12" cy="12" r="10" stroke-width="2"></circle>
                <polyline points="12 6 12 12 16 14" stroke-width="2"></polyline>
            </svg>
            <span data-ai-latency-val>0.0s</span>
        </span>
        
        <!-- Circuit State -->
        <span data-ai-circuit-open class="text-red-500 ml-2 font-bold hidden" title="Circuit is OPEN/HALF-OPEN">
            [CB: OPEN]
        </span>

        <!-- Trace -->
        <div data-ai-fail-trace class="ml-auto text-gray-500 hidden cursor-help items-center">
        </div>
    </div>
</div>

<script>
    if (typeof window.renderAICaptionStatus === 'undefined') {
        window.renderAICaptionStatus = function(rootEl, meta, isLoading, isError = false) {
            if (!rootEl) return;
            
            const loadingBox = rootEl.querySelector('[data-ai-state-loading]');
            const doneBox = rootEl.querySelector('[data-ai-state-done]');
            const badge = rootEl.querySelector('[data-ai-provider-badge]');
            
            rootEl.classList.remove('hidden');
            rootEl.classList.add('flex');

            if (isLoading) {
                loadingBox.classList.remove('hidden');
                loadingBox.classList.add('flex');
                doneBox.classList.remove('flex');
                doneBox.classList.add('hidden');
                return;
            }

            loadingBox.classList.add('hidden');
            loadingBox.classList.remove('flex');
            doneBox.classList.remove('hidden');
            doneBox.classList.add('flex');
            
            // Tailwind Colors config cho Badge
            badge.className = "px-1.5 py-0.5 rounded font-bold mr-2 uppercase tracking-wide text-white ";
            
            if (isError || meta.provider === "ERROR") {
                badge.className += "bg-red-600";
            } else if (meta.provider === "poorman") {
                badge.className += "bg-gray-500";
            } else if (meta.is_fallback) {
                badge.className = "px-1.5 py-0.5 rounded font-bold mr-2 uppercase tracking-wide bg-amber-400 text-yellow-900";
            } else {
                badge.className += "bg-emerald-500";
            }
            
            badge.innerText = meta.provider || "UNKNOWN";
            
            const modelEl = rootEl.querySelector('[data-ai-model-name]');
            if (modelEl) modelEl.innerText = meta.model && meta.model !== "N/A" ? `(${meta.model})` : "";
            
            const latencyEl = rootEl.querySelector('[data-ai-latency-val]');
            if (latencyEl) latencyEl.innerText = meta.latency_ms ? (meta.latency_ms / 1000).toFixed(2) + "s" : "-";

            const circuitElem = rootEl.querySelector('[data-ai-circuit-open]');
            if (circuitElem) {
                if(meta.circuit_state === "OPEN" || meta.circuit_state === "HALF_OPEN") {
                    circuitElem.classList.remove('hidden');
                } else {
                    circuitElem.classList.add('hidden');
                }
            }

            const traceBox = rootEl.querySelector('[data-ai-fail-trace]');
            if (traceBox) {
                if (isError && meta.fail_reason) {
                    traceBox.innerHTML = `<span class="text-red-500 font-semibold">${meta.fail_reason}</span>`;
                    traceBox.classList.remove('hidden');
                    traceBox.classList.add('flex');
                } else if (meta.is_fallback && meta.fail_trace && meta.fail_trace.length > 0) {
                    let traceHtml = meta.fail_trace.map(t => `<span title="Lỗi: ${t.reason}" class="line-through text-red-400">${t.layer}</span>`).join(`
                        <svg class="w-3 h-3 mx-1 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    `);
                    traceBox.innerHTML = traceHtml;
                    traceBox.classList.remove('hidden');
                    traceBox.classList.add('flex');
                } else {
                    traceBox.classList.add('hidden');
                    traceBox.classList.remove('flex');
                }
            }
        };
    }
</script>
