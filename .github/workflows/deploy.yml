name: Deploy to VPS

on:
  push:
    branches:
      - main
      - develop
      - 'cursor/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Dynamic project path detection
            if [ -n "${{ secrets.VPS_PROJECT_PATH }}" ]; then
              DEPLOY_PATH="${{ secrets.VPS_PROJECT_PATH }}"
            elif [ "${{ secrets.VPS_USER }}" = "root" ]; then
              DEPLOY_PATH="/root/toolsauto"
            else
              DEPLOY_PATH="/home/${{ secrets.VPS_USER }}/toolsauto"
            fi
            cd "$DEPLOY_PATH" || exit 1

            echo "=== Deploying branch: ${{ github.ref_name }} ==="

            # Backup database before deploying
            mkdir -p data/backups
            cp data/auto_publisher.db "data/backups/auto_publisher_$(date +%Y%m%d_%H%M%S).db" || true

            # Fetch latest changes and reset
            git fetch origin
            git reset --hard "origin/${{ github.ref_name }}"

            # Update Python dependencies
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Run database migrations
            python manage.py db stamp-if-needed || true
            python manage.py db upgrade head || true

            # Graceful reload PM2 (current jobs finish before restart)
            pm2 reload ecosystem.config.js
            pm2 save

            echo "=== Deploy complete ==="
            pm2 list
