name: Deploy to VPS

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Dynamic project path detection
            if [ -n "${{ secrets.VPS_PROJECT_PATH }}" ]; then
              DEPLOY_PATH="${{ secrets.VPS_PROJECT_PATH }}"
            elif [ "${{ secrets.VPS_USER }}" = "root" ]; then
              DEPLOY_PATH="/root/toolsauto"
            else
              DEPLOY_PATH="/home/${{ secrets.VPS_USER }}/toolsauto"
            fi
            cd "$DEPLOY_PATH" || exit 1

            echo "=== Deploying branch: ${{ github.ref_name }} ==="

            # Xác định vị trí Data DB chuẩn tùy theo trạng thái Migration
            DB_SOURCE="data/auto_publisher.db"
            BACKUP_DIR="data/backups"
            MARKER_FILE="data/.migrated_to_pg"
            if [ -f "storage/db/auto_publisher.db" ]; then
              DB_SOURCE="storage/db/auto_publisher.db"
              BACKUP_DIR="storage/db/backups"
              MARKER_FILE="storage/db/.migrated_to_pg"
            fi

            # Backup database before deploying
            mkdir -p "$BACKUP_DIR"
            cp "$DB_SOURCE" "$BACKUP_DIR/auto_publisher_$(date +%Y%m%d_%H%M%S).db" || true

            # Fetch latest changes and reset
            git fetch origin
            git reset --hard "origin/${{ github.ref_name }}"
            
            # --- MIGRATION: KHỚP HẠ TẦNG LƯU TRỮ (Task-003) ---
            echo "=== Tự động chuyển dời & dọn dẹp cấu trúc Storage ==="
            mkdir -p storage/profiles storage/media/thumbs storage/media/reup storage/db storage/archive_legacy
            [ -d "profiles" ] && cp -rn profiles/* storage/profiles/ 2>/dev/null || true
            [ -d "thumbnails" ] && cp -rn thumbnails/* storage/media/thumbs/ 2>/dev/null || true
            [ -d "reup_videos" ] && cp -rn reup_videos/* storage/media/reup/ 2>/dev/null || true
            [ -d "data" ] && cp -rn data/* storage/db/ 2>/dev/null || true
            
            # Chèn biến config trỏ sang layout mới trong .env nếu chưa có
            if ! grep -q "^STORAGE_LAYOUT_MODE=" .env 2>/dev/null; then
              echo -e "\nSTORAGE_LAYOUT_MODE=storage" >> .env
            else
              sed -i 's/^STORAGE_LAYOUT_MODE=.*/STORAGE_LAYOUT_MODE=storage/g' .env
            fi
            # --------------------------------------------------

            # Update Python dependencies
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Run database schema migrations (Alembic)
            python manage.py db stamp-if-needed || true
            python manage.py db upgrade head || true

            # One-time SQLite → PostgreSQL data migration
            if [ -f "$DB_SOURCE" ] && [ ! -f "$MARKER_FILE" ]; then
              echo "=== Phát hiện SQLite, bắt đầu migrate data sang PostgreSQL... ==="
              python scripts/migrate_sqlite_to_postgres.py \
                --sqlite "$DB_SOURCE" \
                --postgres "${DATABASE_URL:-postgresql+psycopg2://admin:admin@localhost/toolsauto_db}"
              if [ $? -eq 0 ]; then
                touch "$MARKER_FILE"
                echo "=== Migration hoàn tất. Marker tạo tại $MARKER_FILE ==="
              else
                echo "=== [WARNING] Migration thất bại, kiểm tra log ==="
              fi
            else
              echo "=== PostgreSQL migration: Bỏ qua (Đã chạy hoặc DB chính không phải SQLite) ==="
            fi

            # Khởi động lại Server sử dụng chuẩn start.sh (Wrap an toàn Xvfb)
            chmod +x start.sh
            bash ./start.sh

            echo "=== Deploy complete ==="
            pm2 list
