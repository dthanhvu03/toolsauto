<!-- fragments/syspanel/screenshots.html -->
{% if shots %}
<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
    {% for shot in shots %}
    <div class="group relative rounded-lg overflow-hidden border border-gray-200 bg-gray-50 hover:shadow-md transition-all cursor-pointer"
        onclick="window.open('/syspanel/screenshot?path={{ shot.path | urlencode }}', '_blank')">
        <img src="/syspanel/screenshot?path={{ shot.path | urlencode }}" alt="{{ shot.name }}"
            class="w-full h-28 object-cover group-hover:scale-105 transition-transform duration-300" loading="lazy"
            onerror="this.parentElement.style.display='none'">
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent px-2 py-1.5">
            <div class="text-white text-[10px] font-mono truncate">{{ shot.name }}</div>
            <div class="text-gray-300 text-[9px]">{{ shot.mtime }}</div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-8 text-gray-400">
    <div class="text-3xl mb-2">📷</div>
    <div class="text-sm">Chưa có screenshot nào</div>
</div>
{% endif %}
