<form id="manual-job-form" hx-post="/jobs/manual/create" hx-encoding="multipart/form-data"
    hx-target="#manual-job-response" hx-swap="innerHTML" class="flex flex-col">

    <input type="hidden" name="account_id" id="manual-acc-id" value="{{ pages[0].account_id if pages else '' }}">

    {% if not pages %}
    <div class="px-6 py-8 text-center">
        <svg class="w-6 h-6 mx-auto text-amber-500 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <p class="font-semibold text-gray-700 text-sm mb-1">Không có tài khoản nào đang hoạt động</p>
        <p class="text-xs text-gray-400">Vào <a href="/app/accounts" class="text-indigo-600 underline">Accounts</a> →
            đăng nhập trước nhé!</p>
    </div>
    {% else %}
    <div class="px-5 py-4 flex flex-col gap-4">

        <!-- Target Page -->
        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider"><svg
                    class="w-3.5 h-3.5 inline-block mr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>Target Page</label>
            <div class="relative">
                <select name="target_page"
                    onchange="document.getElementById('manual-acc-id').value = this.options[this.selectedIndex].dataset.accId"
                    class="app-select w-full pr-8 appearance-none">
                    {% for p in pages %}
                    <option value="{{ p.page_url }}" data-acc-id="{{ p.account_id }}">
                        {{ p.page_name }} — {{ p.account_name }}
                    </option>
                    {% endfor %}
                </select>
                <span
                    class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-400 text-xs">▾</span>
            </div>
        </div>

        <!-- Media Upload -->
        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider"><svg
                    class="w-3.5 h-3.5 inline-block mr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                </svg>Media <span class="text-gray-300 font-normal normal-case">(tùy chọn)</span></label>
            <label for="media-upload"
                class="flex flex-col items-center justify-center gap-1.5 border-2 border-dashed border-gray-200 rounded-lg p-5 cursor-pointer bg-gray-50 hover:bg-indigo-50 hover:border-indigo-400 transition-colors">
                <span id="drop-icon"><svg class="w-6 h-6 mx-auto text-gray-400" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg></span>
                <span id="drop-label" class="text-xs text-gray-400">Click hoặc kéo thả ảnh / video vào đây</span>
                <input type="file" name="media" id="media-upload" accept="image/*,video/*" class="hidden"
                    onchange="const f=this.files[0]; if(f){document.getElementById('drop-label').textContent=f.name; document.getElementById('drop-icon').innerHTML='<svg class=\'w-6 h-6 mx-auto text-emerald-500\' fill=\'none\' viewBox=\'0 0 24 24\' stroke=\'currentColor\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z\'/></svg>';}">
            </label>
        </div>

        <!-- Caption -->
        <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider"><svg
                    class="w-3.5 h-3.5 inline-block mr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>Caption <span class="text-gray-300 font-normal normal-case">(để trống → AI tự viết)</span></label>
            <textarea name="caption" rows="2" placeholder="Nhập nội dung caption muốn đăng..."
                class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 focus:ring-1 focus:ring-indigo-400 outline-none resize-none placeholder-gray-300"></textarea>
        </div>

        <div id="manual-job-response"></div>
    </div>

    <!-- Footer -->
    <div class="px-5 py-3 border-t border-gray-100 bg-gray-50 flex items-center justify-between gap-3">
        <p class="text-xs text-gray-400"><svg class="w-3.5 h-3.5 inline-block mr-0.5 text-amber-500" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>Ưu tiên tối đa</p>
        <div class="flex gap-2">
            <button type="button" onclick="document.getElementById('manualJobDialog').close()"
                class="app-btn text-sm px-4">Hủy</button>
            <button type="submit"
                onclick="this.innerHTML='<svg class=\'w-4 h-4 inline-block mr-1 animate-spin\' fill=\'none\' viewBox=\'0 0 24 24\'><circle class=\'opacity-25\' cx=\'12\' cy=\'12\' r=\'10\' stroke=\'currentColor\' stroke-width=\'4\'></circle><path class=\'opacity-75\' fill=\'currentColor\' d=\'M4 12a8 8 0 018-8v8H4z\'></path></svg>Đang xử lý...'; this.classList.add('opacity-60', 'pointer-events-none');"
                class="app-btn app-btn-primary text-sm px-5"><svg class="w-4 h-4 inline-block mr-0.5" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 10l7-7m0 0l7 7m-7-7v18" />
                </svg>Đăng ngay!</button>
        </div>
    </div>
    {% endif %}
</form>
