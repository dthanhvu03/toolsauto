<form hx-post="/jobs/manual/create" hx-encoding="multipart/form-data" hx-target="#manual-job-response"
    hx-swap="innerHTML" class="flex flex-col gap-4 p-5">

    <input type="hidden" name="account_id" id="manual-acc-id" value="{{ pages[0].account_id if pages else '' }}">

    <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">🎯 Target Page</label>
        <select name="target_page"
            onchange="document.getElementById('manual-acc-id').value = this.options[this.selectedIndex].dataset.accId"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
            {% for p in pages %}
            <option value="{{ p.page_url }}" data-acc-id="{{ p.account_id }}">
                {{ p.page_name }} (Account: {{ p.account_name }})
            </option>
            {% else %}
            <option disabled>⚠️ Không có account ACTIVE nào. Hãy đăng nhập tài khoản trước.</option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">📎 Media (ảnh hoặc video)</label>
        <input type="file" name="media" accept="image/*,video/*"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white file:mr-3 file:py-1 file:px-3 file:rounded file:border-0 file:bg-indigo-50 file:text-indigo-700 file:font-medium file:text-xs cursor-pointer">
        <p class="text-[10px] text-gray-400 mt-1">Tùy chọn. Nếu không chọn, bot sẽ lấy con Bot tự chọn media từ kho.</p>
    </div>

    <div>
        <label class="block text-xs font-semibold text-gray-600 mb-1">💬 Caption (tùy chọn)</label>
        <textarea name="caption" rows="3" placeholder="Nhập caption muốn đăng. Để trống để Bot AI tự viết."
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none resize-y"></textarea>
    </div>

    <div id="manual-job-response"></div>

    <button type="submit" onclick="this.textContent='Đang tạo job...'; this.disabled=true;"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-6 rounded-lg text-sm shadow-sm transition-all hover:-translate-y-0.5 w-full">
        🚀 Push to Queue (ưu tiên tối đa)
    </button>
</form>
