<div id="accounts-table-container" class="relative z-10">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 px-4">
        <h2 class="text-lg font-bold font-display text-gray-800">Nodes Collection</h2>
        <!-- Quick Add Form -->
        <form hx-post="/accounts/create" hx-target="#accounts-table-container" hx-swap="outerHTML"
            class="flex flex-wrap gap-2 items-center">
            <select name="platform"
                class="border border-gray-200 rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white transition-shadow outline-none shadow-sm">
                <option value="facebook">facebook</option>
                <option value="instagram">instagram</option>
            </select>
            <input type="text" name="name" placeholder="Profile Name..." required
                class="border border-gray-200 rounded-lg px-3 py-2 text-xs focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow outline-none shadow-sm w-[140px]">
            <button type="submit"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg text-xs tracking-wider uppercase shadow-sm transition-all hover:-translate-y-0.5 outline-none">
                Add Node
            </button>
        </form>
    </div>

    <!-- The actual Grid instead of table -->
    <div class="mb-4 px-2 md:px-4">
        <div id="accounts-table-body" 
             class="grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-6" 
             hx-get="/accounts/table" hx-trigger="load, every 60s" hx-swap="innerHTML">
            {% for account in accounts %}
            {% include "fragments/account_row.html" %}
            {% endfor %}
        </div>
    </div>
</div>
