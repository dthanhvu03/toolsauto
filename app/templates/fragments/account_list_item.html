<div class="account-item group flex items-center gap-3 p-3 cursor-pointer border-b border-gray-50 hover:bg-indigo-50/50 transition-all"
    hx-get="/accounts/{{ account.id }}/details" hx-target="#accountDetailArea" hx-swap="innerHTML"
    onclick="document.querySelectorAll('.account-item').forEach(el => el.classList.remove('bg-indigo-50', 'border-l-4', 'border-l-indigo-600')); this.classList.add('bg-indigo-50', 'border-l-4', 'border-l-indigo-600')">

    <div class="relative shrink-0">
        <div
            class="w-8 h-8 rounded-lg {% if account.platform=='facebook' %}bg-blue-600{% elif account.platform=='instagram' %}bg-gradient-to-tr from-pink-500 to-purple-600{% else %}bg-gray-800{% endif %} flex items-center justify-center text-white shadow-sm">
            <span class="text-[10px] font-bold">{{ account.platform[0]|upper }}</span>
        </div>
        <div
            class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border-2 border-white {% if account.login_status == 'ACTIVE' %}bg-emerald-500{% else %}bg-red-400{% endif %}">
        </div>
    </div>

    <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
            <h4 class="text-xs font-bold text-gray-900 truncate font-display">{{ account.name }}</h4>
            {% if account.is_active %}
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
            {% endif %}
        </div>
        <p class="text-[10px] text-gray-400 font-medium truncate uppercase tracking-wider">{{ account.platform }}</p>
    </div>

    <div class="opacity-0 group-hover:opacity-100 transition-opacity">
        <svg class="w-3.5 h-3.5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
        </svg>
    </div>
</div>
