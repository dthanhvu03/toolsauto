<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
        <h2 class="text-xl font-bold font-display flex items-center gap-2 text-gray-800">
            <svg class="w-6 h-6 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            Viral Content Scraped <span class="text-sm font-normal text-gray-500">(Tự động cào)</span>
        </h2>
        <div id="viral-settings"
            class="flex flex-wrap items-center gap-3 bg-gray-50/50 p-2 border border-gray-100 rounded-lg">
            <label class="text-sm font-medium text-gray-700 flex items-center gap-2">
                Ngưỡng view tối thiểu:
                <input type="number" name="viral_min_views" value="{{ viral_min_views | default(10000) }}" min="500"
                    max="10000000" step="500"
                    class="w-28 border border-gray-300 rounded-md px-2 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow bg-white">
                <span class="text-gray-400 text-xs font-normal">views</span>
            </label>
            <label class="text-sm font-medium text-gray-700 flex items-center gap-2">
                Tối đa mỗi kênh:
                <input type="number" name="viral_max_videos_per_channel" value="{{ viral_max_videos | default(50) }}"
                    min="0" max="500" placeholder="0 = all"
                    class="w-20 border border-gray-300 rounded-md px-2 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-shadow bg-white"
                    title="0 = lấy tối đa (cap 500)">
            </label>
            <button type="button" hx-post="/viral/settings"
                hx-include="#viral-settings [name='viral_min_views'], #viral-settings [name='viral_max_videos_per_channel']"
                hx-target="#viral-settings" hx-swap="outerHTML"
                class="text-sm font-medium bg-gray-800 hover:bg-gray-900 text-white px-4 py-1.5 rounded-lg shadow-sm transition-all hover:-translate-y-0.5">Lưu</button>
        </div>
        <div class="flex items-center gap-3">
            <button
                class="text-sm bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition-all hover:-translate-y-0.5 flex items-center gap-2"
                hx-post="/viral/force-scan" hx-target="#viral-table-body" hx-swap="innerHTML"
                hx-indicator="#viral-scan-indicator"
                hx-on::before-request="this.disabled=true; this.innerHTML='<svg class=\'w-3.5 h-3.5 inline-block animate-spin\' fill=\'none\' viewBox=\'0 0 24 24\'><circle class=\'opacity-25\' cx=\'12\' cy=\'12\' r=\'10\' stroke=\'currentColor\' stroke-width=\'4\'></circle><path class=\'opacity-75\' fill=\'currentColor\' d=\'M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z\'></path></svg> Đang quét...';"
                hx-on::after-request="this.disabled=false; this.innerHTML='<svg class=\'w-3.5 h-3.5 inline-block\' fill=\'none\' viewBox=\'0 0 24 24\' stroke=\'currentColor\'><path stroke-linecap=\'round\' stroke-linejoin=\'round\' stroke-width=\'2\' d=\'M13 10V3L4 14h7v7l9-11h-7z\'/></svg> Quét ngay';">
                <svg class="w-3.5 h-3.5 inline-block mr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>Quét ngay
            </button>
            <span id="viral-scan-indicator" class="htmx-indicator text-amber-600 text-xs font-medium">Đang
                quét...</span>
            <button
                class="text-sm font-medium bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg shadow-sm transition-all"
                hx-get="/viral/table" hx-target="#viral-table-body" hx-swap="innerHTML">
                Refresh
            </button>
        </div>
    </div>

    <div class="overflow-x-auto max-h-[400px] overflow-y-auto rounded-xl border border-gray-200 shadow-sm">
        <table class="min-w-full table-fixed border-collapse divide-y divide-gray-200">
            <thead class="sticky top-0 z-10 bg-gray-50 shadow-sm border-b border-gray-200">
                <tr>
                    <th class="w-16 px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">ID
                    </th>
                    <th
                        class="w-[38%] px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Tiêu đề / URL</th>
                    <th class="w-32 px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Lượt Views</th>
                    <th class="w-48 px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Nguồn thu thập
                        (Account)</th>
                    <th class="w-48 px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Trạng thái AI</th>
                    <th class="w-24 px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">
                        Actions</th>
                </tr>
            </thead>
            <tbody id="viral-table-body" class="bg-white divide-y divide-gray-100" hx-get="/viral/table"
                hx-trigger="load, every 30s">
                <!-- HTMX will poll and inject rows here -->
                <tr>
                    <td colspan="6" class="p-4 text-center text-sm text-gray-500">Đang tải dữ liệu Viral...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
