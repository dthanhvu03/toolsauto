<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Auto Publisher{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="stylesheet" href="/static/app.css" />
</head>

<body class="text-[var(--text)] bg-[var(--bg)]">
  <!-- Mobile topbar -->
  <div class="lg:hidden sticky top-0 z-40 bg-[var(--surface)] border-b border-[var(--border)]">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <button id="menuBtn" class="h-10 w-10 inline-flex items-center justify-center rounded border border-[var(--border)] bg-white">
        <span class="sr-only">Open menu</span>
        <svg class="h-5 w-5 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="text-sm font-semibold">Auto Publisher</div>
      <a href="/health" class="h-10 px-3 inline-flex items-center rounded border border-[var(--border)] bg-white text-sm text-slate-700">Health</a>
    </div>
  </div>

  <div class="min-h-screen lg:flex">
    <!-- Sidebar -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/30 z-40 hidden lg:hidden"></div>
    <aside id="sidebar"
           class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-[var(--surface)] border-r border-[var(--border)] transform -translate-x-full lg:translate-x-0 transition-transform">
      <div class="h-16 px-5 flex items-center border-b border-[var(--border)]">
        <div class="font-bold tracking-tight">Auto Publisher</div>
      </div>
      <nav class="p-3 text-sm">
        {% set p = request.url.path %}
        <a href="/app" class="nav-item block px-3 py-2 rounded {% if p == '/app' %}bg-indigo-50 text-indigo-700 border border-indigo-100{% else %}hover:bg-slate-50{% endif %}">Overview</a>
        <a href="/app/jobs" class="nav-item block px-3 py-2 rounded {% if p.startswith('/app/jobs') %}bg-indigo-50 text-indigo-700 border border-indigo-100{% else %}hover:bg-slate-50{% endif %}">Jobs</a>
        <a href="/app/viral" class="nav-item block px-3 py-2 rounded {% if p.startswith('/app/viral') %}bg-indigo-50 text-indigo-700 border border-indigo-100{% else %}hover:bg-slate-50{% endif %}">Viral</a>
        <a href="/app/tiktok-links" class="nav-item block px-3 py-2 rounded {% if p.startswith('/app/tiktok-links') %}bg-indigo-50 text-indigo-700 border border-indigo-100{% else %}hover:bg-slate-50{% endif %}">TikTok Links</a>
        <a href="/app/accounts" class="nav-item block px-3 py-2 rounded {% if p.startswith('/app/accounts') %}bg-indigo-50 text-indigo-700 border border-indigo-100{% else %}hover:bg-slate-50{% endif %}">Accounts</a>
        <div class="mt-3 pt-3 border-t border-[var(--border)]">
          <a href="/tiktok-links" class="block px-3 py-2 rounded hover:bg-slate-50 text-slate-700">TikTok Links (legacy)</a>
          <a href="/" class="block px-3 py-2 rounded hover:bg-slate-50 text-slate-700">Old dashboard</a>
        </div>
      </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1">
      <div class="max-w-7xl mx-auto px-4 py-4 lg:px-6 lg:py-6">
        <div class="hidden lg:flex items-center justify-between mb-6">
          <div>
            <div class="text-xl font-semibold">{% block page_title %}{% endblock %}</div>
            <div class="text-xs text-[var(--muted)]">{% block page_subtitle %}{% endblock %}</div>
          </div>
          <div class="flex items-center gap-2">
            <a href="/health" class="h-10 px-3 inline-flex items-center rounded border border-[var(--border)] bg-white text-sm text-slate-700 hover:bg-slate-50">
              System Health
            </a>
          </div>
        </div>

        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const btn = document.getElementById('menuBtn');
    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
    }
    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
    }
    if (btn) btn.addEventListener('click', openSidebar);
    if (overlay) overlay.addEventListener('click', closeSidebar);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSidebar();
    });
  </script>
</body>
</html>
