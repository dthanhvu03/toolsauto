name: Deploy to VPS

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Project path: root home is /root, not /home/root
            if [ -n "${{ secrets.VPS_PROJECT_PATH }}" ]; then
              DEPLOY_PATH="${{ secrets.VPS_PROJECT_PATH }}"
            elif [ "${{ secrets.VPS_USER }}" = "root" ]; then
              DEPLOY_PATH="/root/toolsauto"
            else
              DEPLOY_PATH="/home/${{ secrets.VPS_USER }}/toolsauto"
            fi
            cd "$DEPLOY_PATH" || exit 1

            # Backup database before deploying
            mkdir -p data/backups
            cp data/auto_publisher.db data/backups/auto_publisher_$(date +%Y%m%d_%H%M%S).db || true

            # Fetch latest changes and reset
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            # Update Python dependencies
            source venv/bin/activate
            pip install -r requirements.txt

            # Run database migrations
            python manage.py db stamp-if-needed
            python manage.py db upgrade head

            # Update Node dependencies (if package.json changed)
            npm install || true

            # Restart all PM2 workers
            pm2 restart all
            pm2 save
