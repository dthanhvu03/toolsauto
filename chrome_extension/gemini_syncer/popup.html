<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Gemini Cookie Syncer</title>
    <style>
        body {
            width: 320px;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 16px;
            margin: 0;
            background: #f8fafc;
        }

        h2 {
            font-size: 16px;
            margin-top: 0;
            color: #1e293b;
            text-align: center;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #475569;
            margin-bottom: 4px;
            font-weight: 600;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }

        input:focus {
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
            transition: 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        #status {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
            font-weight: 500;
            word-break: break-word;
        }

        .success {
            color: #16a34a;
        }

        .error {
            color: #dc2626;
        }

        .footer {
            font-size: 11px;
            text-align: center;
            margin-top: 16px;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <h2>🤖 Gemini VPS Syncer</h2>

    <div class="form-group">
        <label for="vps_url">Địa chỉ IP của VPS (VD: http://1.2.3.4:8000)</label>
        <input type="text" id="vps_url" placeholder="http://1.2.3.4:8000" />
    </div>

    <div class="form-group">
        <label for="api_secret">Mã Bảo Mật (API Secret)</label>
        <input type="password" id="api_secret" placeholder="Mã bí mật gắn ở Web Server" />
    </div>

    <button id="sync_btn">Bơm Cookie Lên VPS 🚀</button>
    <div id="status"></div>

    <div class="footer">Auto Publisher - Hồi sinh Bot từ xa</div>

    <script src="popup.js"></script>
</body>

</html>
