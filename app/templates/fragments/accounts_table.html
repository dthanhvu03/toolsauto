<div id="accounts-table-container">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <h2 class="text-xl font-bold font-display text-gray-800">Accounts Management</h2>

        <!-- Quick Add Form -->
        <form hx-post="/accounts/create" hx-target="#accounts-table-container" hx-swap="outerHTML"
            class="flex flex-wrap gap-2 items-center">
            <select name="platform"
                class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white transition-shadow outline-none">
                <option value="facebook">facebook</option>
                <option value="instagram">instagram</option>
            </select>
            <input type="text" name="name" placeholder="Profile Name (e.g. MyPage)" required
                class="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow outline-none">
            <button type="submit"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-lg text-sm shadow-sm transition-all hover:-translate-y-0.5 outline-none">
                Add Account
            </button>
        </form>
    </div>

    <div class="overflow-x-auto shadow-sm rounded-xl border border-gray-200 mb-8">
        <table class="w-full text-left border-collapse bg-white divide-y divide-gray-200">
            <thead class="bg-gray-50 border-b border-gray-200">
                <tr>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Profile Name</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Automation</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Session State
                    </th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider w-72">Limits &
                        Settings</th>
                    <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">
                        Controls</th>
                </tr>
            </thead>
            <tbody id="accounts-table-body" hx-get="/accounts/table" hx-trigger="load, every 10s" hx-swap="innerHTML">
                {% for account in accounts %}
                {% include "fragments/account_row.html" %}
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
